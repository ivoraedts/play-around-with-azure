# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - vue-frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  VUE_PROJECT_PATH: './01-app-service/vue-front-end-with-dot-net-backend/vue-frontend/vuetify-front-end'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          cd ${{ env.VUE_PROJECT_PATH }}
          # 1. Pull down all required frontend code packages
          npm install --ignore-scripts
          
          # 2. Grant executable permission to the local Vite binary file
          chmod +x node_modules/.bin/vite
          
          # 3. Compile the production code safely
          npx vite build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ env.VUE_PROJECT_PATH }}/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_83784AA27A7749CDBA4DED6A36BB57F5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B3B7C1F522C740569AA08891B646D0E7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7E46AC6B4294401298E30324CBC5465F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vue-frontend'
          slot-name: 'Production'
          package: .
          