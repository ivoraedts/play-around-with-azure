# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - dotnet-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  API_PROJECT_PATH: './01-app-service/vue-front-end-with-dot-net-backend/dotnet-api/Web.API'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build ${{ env.API_PROJECT_PATH }}--configuration Release

      - name: dotnet publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} -c Release -o ${{ runner.workspace }}/publish_output

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ runner.workspace }}/publish_output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBBC09DD5C34400EB597A7B049603976 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_07842C62CCA64096BFBECD5976105BAE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_754A57CE288243ABA06A5233209E0920 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dotnet-api'
          slot-name: 'Production'
          package: .
          